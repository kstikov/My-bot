name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unpack project ZIP
        run: |
          unzip -q "nothing_music (1).zip" -d ./

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Hard-clean package.json
        run: |
          cd artifacts/nothing-muz
          sed -i '/@workspace\/api-client-react/d' package.json
          sed -i 's/"catalog:"/"latest"/g' package.json
          sed -i 's/"react": ".*"/"react": "19.1.0"/g' package.json
          sed -i 's/"react-dom": ".*"/"react-dom": "19.1.0"/g' package.json

      - name: Install Dependencies
        run: |
          cd artifacts/nothing-muz
          npm install --legacy-peer-deps

      - name: Generate Android Folder Plainly
        run: |
          cd artifacts/nothing-muz
          # Запускаем пребилд БЕЗ каких-либо проверок и флагов, чисто создать папку android
          npx expo prebuild --platform android --no-install

      - name: Build Final APK
        run: |
          cd artifacts/nothing-muz/android
          chmod +x gradlew
          # Собираем апк напрямую, забивая на внутренние проверки Expo
          ./gradlew assembleRelease
