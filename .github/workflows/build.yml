name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unpack project ZIP
        run: |
          unzip -q "nothing_music (1).zip" -d ./
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Hard-fix package.json
        run: |
          cd artifacts/nothing-muz
          # Выпиливаем локальные зависимости воркспейса
          sed -i '/@workspace\/api-client-react/d' package.json
          
          # Сначала меняем "catalog:" на временный "latest"
          sed -i 's/"catalog:"/"latest"/g' package.json
          
          # Намертво прописываем версии React, которые требует Expo на скриншоте
          sed -i 's/"react": ".*"/"react": "19.1.0"/g' package.json
          sed -i 's/"react-dom": ".*"/"react-dom": "19.1.0"/g' package.json

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Install Deps and Prebuild
        run: |
          cd artifacts/nothing-muz
          # Ставим зависимости с жестким игнорированием конфликтов peer-зависимостей
          npm install --legacy-peer-deps
          # Генерируем проект без лишних проверок
          npx expo prebuild --platform android --no-install

      - name: Build Android App (Gradle)
        run: |
          cd artifacts/nothing-muz/android
          chmod +x gradlew
          ./gradlew assembleRelease
