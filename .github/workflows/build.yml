name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unpack project ZIP
        run: |
          unzip -q "nothing_music (1).zip" -d ./
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pre-clean package.json
        run: |
          cd artifacts/nothing-muz
          # Выпиливаем локальные зависимости воркспейса
          sed -i '/@workspace\/api-client-react/d' package.json
          # Заменяем капризные "catalog:" на временный "latest", чтобы npm не падал
          sed -i 's/"catalog:"/"latest"/g' package.json

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Smart Install and Auto-Fix Dependencies
        run: |
          cd artifacts/nothing-muz
          # Базовая установка
          npm install --legacy-peer-deps
          # Expo сам проверяет package.json и заменяет версии на жестко совместимые
          npx expo install --check
          # Генерируем нативную папку android без лишних вопросов
          npx expo prebuild --platform android --no-install

      - name: Build Android App (Gradle)
        run: |
          cd artifacts/nothing-muz/android
          chmod +x gradlew
          ./gradlew assembleRelease
