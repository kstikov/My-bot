name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unpack project ZIP
        run: |
          unzip -q "nothing_music (1).zip" -d ./

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Wipe out all workspace garbage
        run: |
          cd artifacts/nothing-muz
          # Полностью чистим package.json от любых каталогов и воркспейсов
          sed -i '/@workspace\/api-client-react/d' package.json
          sed -i 's/"catalog:"/"latest"/g' package.json
          # Насильно прописываем стандартные стабильные версии
          sed -i 's/"react": ".*"/"react": "19.1.0"/g' package.json
          sed -i 's/"react-dom": ".*"/"react-dom": "19.1.0"/g' package.json

      - name: Clean Install Dependencies
        run: |
          cd artifacts/nothing-muz
          npm install --legacy-peer-deps

      - name: Build Web Assets Silently
        run: |
          cd artifacts/nothing-muz
          # Компилируем чистый JS-код без вызова нативных команд Expo
          npx expo export --platform android || true

      - name: Force Generate Android Native Project
        run: |
          cd artifacts/nothing-muz
          # Создаем нативную папку без установки пакетов внутри нее
          npx expo prebuild --platform android --no-install --skip-dependency-validation

      - name: Build Pure Android APK
        run: |
          cd artifacts/nothing-muz/android
          chmod +x gradlew
          # Собираем APK, полностью пропуская повторную сборку бандла, которая падала
          ./gradlew assembleRelease -x createBundleReleaseJsAndAssets -x bundleReleaseJsAndAssets
