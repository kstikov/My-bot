name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unpack project ZIP
        run: |
          unzip -q "nothing_music (1).zip" -d ./
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Clean package.json
        run: |
          cd artifacts/nothing-muz
          sed -i '/@workspace\/api-client-react/d' package.json

      - name: Install Expo CLI
        run: pnpm add -g expo-cli

      - name: Install Deps and Build APK
        run: |
          cd artifacts/nothing-muz
          pnpm install --no-frozen-lockfile
          npx expo prebuild --platform android
          cd android && ./gradlew assembleRelease
